/* ── 文章页专属样式 ── */
body { min-height: 100vh; display: flex; flex-direction: column; }
main { flex: 1; }

/* 文章头 */
.post-hero {
  padding: 7rem 0 3.5rem;
  border-bottom: 1px solid var(--border);
  position: relative; overflow: hidden;
}
.post-hero::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, black 20%, transparent 100%);
  pointer-events: none;
}
.post-breadcrumb {
  display: flex; align-items: center; gap: .5rem;
  font-family: var(--ff-mono); font-size: .63rem;
  color: var(--text-3); margin-bottom: 1.8rem;
  position: relative; z-index: 1;
}
.post-breadcrumb a { transition: color .2s; }
.post-breadcrumb a:hover { color: var(--text); }
.post-breadcrumb-sep { color: var(--text-3); }

.post-head-meta {
  display: flex; align-items: center; gap: .75rem;
  margin-bottom: 1.2rem; position: relative; z-index: 1;
}
.post-head-date { font-family: var(--ff-mono); font-size: .65rem; color: var(--text-3); letter-spacing: .06em; }
.post-head-read { font-family: var(--ff-mono); font-size: .65rem; color: var(--text-3); }
.post-head-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text-3); }

h1.post-title {
  font-family: var(--ff-serif); font-weight: 600;
  font-size: clamp(1.9rem, 4vw, 3rem);
  line-height: 1.22; letter-spacing: -.02em; color: var(--text);
  margin-bottom: 1.2rem; position: relative; z-index: 1;
}
.post-subtitle {
  font-size: 1.05rem; color: var(--text-2); line-height: 1.8;
  max-width: 600px; position: relative; z-index: 1;
}

/* 正文 */
.post-layout {
  display: grid; grid-template-columns: 1fr 220px;
  gap: 4rem; padding: 3.5rem 0 6rem; align-items: start;
}
.post-body { min-width: 0; }

/* 正文排版 */
.prose { font-size: 1.02rem; color: var(--text-2); line-height: 1.9; }
.prose p { margin-bottom: 1.4rem; }
.prose p:last-child { margin-bottom: 0; }
.prose h2 {
  font-family: var(--ff-serif); font-size: 1.5rem; font-weight: 600;
  color: var(--text); letter-spacing: -.01em; line-height: 1.3;
  margin: 2.8rem 0 1rem;
}
.prose h3 {
  font-family: var(--ff-sans); font-size: 1.05rem; font-weight: 600;
  color: var(--text); margin: 2rem 0 .8rem;
}
.prose strong { color: var(--text); font-weight: 600; }
.prose em { font-style: italic; }
.prose a { color: var(--cs); border-bottom: 1px solid rgba(91,156,246,.3); transition: border-color .2s; }
.prose a:hover { border-color: var(--cs); }
.prose ul, .prose ol { margin: 1rem 0 1.4rem 1.2rem; display: flex; flex-direction: column; gap: .4rem; }
.prose ul li { list-style: disc; padding-left: .4rem; }
.prose ol li { list-style: decimal; padding-left: .4rem; }
.prose blockquote {
  border-left: 3px solid var(--cs);
  margin: 1.6rem 0; padding: .8rem 1.4rem;
  background: rgba(91,156,246,.05); border-radius: 0 var(--r) var(--r) 0;
  color: var(--text-2); font-style: italic;
}
.prose hr { border: none; border-top: 1px solid var(--border); margin: 2.5rem 0; }

/* 代码块 */
pre.code-block {
  background: linear-gradient(180deg, rgba(255,255,255,.015), rgba(255,255,255,0)) , var(--bg-2);
  border: 1px solid var(--border-2); border-radius: var(--r);
  padding: 1.2rem 1.4rem; margin: 1.4rem 0;
  font-family: var(--ff-mono); font-size: .82rem; line-height: 1.75;
  color: var(--text); overflow-x: auto;
}
pre.code-block .lang-label {
  display: block; font-size: .58rem; letter-spacing: .1em; text-transform: uppercase;
  color: var(--text-3); margin-bottom: .6rem; padding-bottom: .5rem;
  border-bottom: 1px solid var(--border);
}
.copy-btn {
  position: absolute; top: .75rem; right: .75rem;
  font-family: var(--ff-mono); font-size: .58rem; letter-spacing: .08em; text-transform: uppercase;
  color: var(--text-3); background: var(--bg-3); border: 1px solid var(--border);
  padding: .2rem .55rem; border-radius: var(--r); cursor: pointer;
  transition: color .2s, border-color .2s;
}
.copy-btn:hover { color: var(--text); border-color: var(--border-2); }

/* 行内代码 */
.prose code {
  font-family: var(--ff-mono); font-size: .82em;
  background: var(--bg-3); padding: .15em .45em;
  border-radius: 3px; color: var(--cpp);
}
/* 代码块内 code 不使用行内代码样式，避免出现一条条色块 */
.prose pre code {
  background: transparent;
  padding: 0;
  border-radius: 0;
  color: inherit;
  font-size: inherit;
}
.prose pre code.hljs {
  background: transparent;
  padding: 0;
}

/* 文章底部 */
.post-footer-nav {
  margin-top: 3rem; padding-top: 2rem;
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center; gap: 1rem;
}
.post-nav-link {
  display: flex; flex-direction: column; gap: .3rem; max-width: 280px;
}
.post-nav-label { font-family: var(--ff-mono); font-size: .6rem; letter-spacing: .1em; text-transform: uppercase; color: var(--text-3); }
.post-nav-title { font-family: var(--ff-serif); font-size: .95rem; color: var(--text-2); line-height: 1.4; transition: color .2s; }
.post-nav-link:hover .post-nav-title { color: var(--text); }
.post-nav-link--next { text-align: right; }

/* 右侧目录 */
.toc-sidebar { position: sticky; top: 78px; }
.toc-widget { background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.toc-head {
  padding: .75rem 1.1rem; border-bottom: 1px solid var(--border);
  font-family: var(--ff-mono); font-size: .6rem; letter-spacing: .12em;
  text-transform: uppercase; color: var(--text-3);
  display: flex; align-items: center; gap: .5rem;
}
.toc-dot { width: 5px; height: 5px; border-radius: 50%; }
.toc-body { padding: .8rem 0; }
.toc-item {
  display: block; padding: .38rem 1.1rem;
  font-family: var(--ff-mono); font-size: .65rem; color: var(--text-3);
  letter-spacing: .03em; transition: color .2s, background .2s;
  border-left: 2px solid transparent;
}
.toc-item:hover, .toc-item.active { color: var(--text); background: var(--bg-3); border-left-color: var(--cs); }
.toc-item--h3 { padding-left: 2rem; font-size: .62rem; }

@media (max-width: 900px) {
  .post-layout { grid-template-columns: 1fr; }
  .toc-sidebar { display: none; }
}
@media (max-width: 768px) {
  .post-footer-nav { flex-direction: column; align-items: flex-start; }
  .post-nav-link--next { text-align: left; }
}
</style>
</head>

<script>
/* 目录自动高亮 */
const tocLinks = document.querySelectorAll('.toc-item');
const headings = document.querySelectorAll('.prose h2, .prose h3');
if (tocLinks.length && headings.length) {
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        tocLinks.forEach(l => l.classList.remove('active'));
        const match = [...tocLinks].find(l => l.getAttribute('href') === '#' + e.target.id);
        if (match) match.classList.add('active');
      }
    });
  }, { rootMargin: '-20% 0px -70% 0px' });
  headings.forEach(h => io.observe(h));
}
</script>
